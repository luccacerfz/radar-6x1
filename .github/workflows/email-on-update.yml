name: Aviso por e-mail (mudança real)

# Envia um e-mail para o destinatário sempre que a rotina commita uma
# mudança real (commit marcado com [ALERTA]) que toque os dados do painel.
# Como a rotina só commita quando há novidade, isto = "só avisa em mudança real".

on:
  push:
    branches: [main]
    paths:
      - "data/**"

jobs:
  notificar:
    runs-on: ubuntu-latest
    # só dispara em commits de mudança real (convenção do projeto)
    if: contains(github.event.head_commit.message, '[ALERTA]')

    env:
      DESTINATARIO: cltabet@gmail.com
      SITE_URL: https://6por1.vercel.app   # ajuste se o domínio do Vercel for outro

    steps:
      - uses: actions/checkout@v4

      - name: Extrair índice e evento do painel
        id: dados
        run: |
          node -e '
            const fs = require("fs");
            const src = fs.readFileSync("data/data.js", "utf8");
            const DATA = new Function(src + "; return DATA;")();
            const i = DATA.indice;
            const comp = i.componentes.map(c => `${c.nome}: ${c.valor}`).join(" · ");
            const hist = JSON.parse(fs.readFileSync("data/history.json", "utf8"));
            const ult = hist.pontos[hist.pontos.length - 1];
            const out = fs.openSync(process.env.GITHUB_OUTPUT, "a");
            fs.writeSync(out, `valor=${i.valor}\n`);
            fs.writeSync(out, `classificacao=${i.classificacao}\n`);
            fs.writeSync(out, `atualizado=${DATA.atualizadoEm}\n`);
            fs.writeSync(out, `componentes=${comp}\n`);
            fs.writeSync(out, `evento=${(ult.evento || "(sem descrição de evento)").replace(/\n/g, " ")}\n`);
          '

      - name: Enviar e-mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Radar 6x1 <${{ secrets.MAIL_USERNAME }}>
          to: ${{ env.DESTINATARIO }}
          subject: "Radar 6×1 — índice ${{ steps.dados.outputs.valor }} (${{ steps.dados.outputs.classificacao }}) · mudança real"
          html_body: |
            <div style="font-family:Georgia,serif;max-width:560px;color:#16130c">
              <h2 style="color:#c8311b;margin-bottom:4px">Radar 6×1 — mudança real</h2>
              <p style="margin:0 0 16px;color:#666">Atualizado em ${{ steps.dados.outputs.atualizado }}</p>

              <p style="font-size:15px;line-height:1.5"><strong>O que mudou:</strong><br>
              ${{ steps.dados.outputs.evento }}</p>

              <table style="border-collapse:collapse;margin:16px 0">
                <tr><td style="padding:6px 12px;background:#f7f2e7"><strong>Índice de calor</strong></td>
                    <td style="padding:6px 12px;background:#f7f2e7;font-size:20px"><strong>${{ steps.dados.outputs.valor }}/100</strong> · ${{ steps.dados.outputs.classificacao }}</td></tr>
                <tr><td style="padding:6px 12px">Componentes</td>
                    <td style="padding:6px 12px">${{ steps.dados.outputs.componentes }}</td></tr>
              </table>

              <p style="font-size:14px"><strong>Commit:</strong> ${{ github.event.head_commit.message }}</p>

              <p style="margin-top:20px">
                <a href="${{ env.SITE_URL }}" style="background:#c8311b;color:#fff;padding:10px 18px;text-decoration:none;border-radius:4px">Ver o painel →</a>
              </p>
              <p style="font-size:12px;color:#999;margin-top:18px">
                Aviso automático enviado a cada mudança real registrada no Radar 6×1.<br>
                Histórico: ${{ github.server_url }}/${{ github.repository }}/commits/main
              </p>
            </div>
